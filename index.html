<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<title>Slangetje</title>

<style>

body {
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container {
background:#020617;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(34,197,94,0.2);
}

.scoreboard {
font-size:22px;
margin-bottom:10px;
}

button {
background:#22c55e;
border:none;
padding:12px 30px;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
margin-bottom:15px;
}

button:hover {
background:#16a34a;
}

canvas {
background:#0f172a;
border-radius:12px;
box-shadow:0 0 20px rgba(34,197,94,0.3);
}

</style>

</head>

<body>

<div class="container">

<h1>🐍 Slangetje</h1>

<div class="scoreboard">

Score:
<span id="score">0</span>

&nbsp;&nbsp;&nbsp;

Levens:
<span id="hearts">❤️❤️❤️</span>

</div>

<button id="startBtn">Start Spel</button>

<br>

<canvas id="game" width="400" height="400"></canvas>

</div>

<script src="script.js"></script>

</body>

</html>
